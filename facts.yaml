# Canonical facts about The Flip, and the dynamic rules we expect to hold.
#
# This file is the source of truth that web pages are checked against. It is
# hand-maintained and reviewed in git — when the museum's real-world details
# change, change them HERE first, then webwatch will flag any site still showing
# the old information.
#
# Schema and rule types are documented in docs/Facts.md.
#
# These are the museum's real, verified details. When something changes in the
# real world, change it HERE first; webwatch then flags any site still showing the
# old value. Leave a field empty ("") to mean "not verified — don't check it".

organization:
  name: 'The Flip'
  url: 'https://www.theflip.museum/'

  address:
    street: '108 North State St, Suite 015'
    city: 'Chicago'
    region: 'IL'
    postal_code: '60602'
    country: 'US'

  phone: '312-999-0153'
  email: 'hello@theflip.museum'

  hours:
    monday: '10:00 - 20:00'
    tuesday: '10:00 - 20:00'
    wednesday: '10:00 - 20:00'
    thursday: '10:00 - 20:00'
    friday: '10:00 - 20:00'
    saturday: '10:00 - 20:00'
    sunday: '11:00 - 18:00'

# Dynamic expectations evaluated against observed events/schedules.
# See docs/Facts.md for the full rule schema. These are examples to grow from.
rules:
  - id: weekly-repair-day
    description: 'Volunteer repair day every Saturday'
    type: recurring_event
    # Which upcoming event this rule corresponds to (matched against title/description).
    match: repair
    frequency: weekly
    weekday: saturday
    # For recurring events the time matters: volunteer days run 10:00-16:00.
    start: '10:00'
    end: '16:00'
    enabled: true
