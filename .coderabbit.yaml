# CodeRabbit configuration
# https://docs.coderabbit.ai/reference/configuration

reviews:
  tools:
    languagetool:
      enabled: false
  pre_merge_checks:
    docstrings:
      # Disabled: produces false positives on refactoring PRs
      mode: off
  path_filters:
    # Autogenerated from docs/AGENTS.src.md (review the source, not the output)
    - '!CLAUDE.md'
    - '!AGENTS.md'
    # Virtual environment and caches
    - '!.venv/**'
    - '!.mypy_cache/**'
    - '!.ruff_cache/**'
    - '!.pytest_cache/**'
    # IDE/editor configs
    - '!.idea/**'
    - '!.vscode/**'
    # Environment files
    - '!.env'
    # Secrets baseline (detect-secrets output)
    - '!.secrets.baseline'
    # OS files
    - '!.DS_Store'
